<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>DX Záznamník – Seznam míst</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 10px;
    background: #f5f5f5;
  }

  h1 {
    margin-bottom: 15px;
  }

  .backBtn {
    display: inline-block;
    padding: 14px 20px;
    background: #1976d2;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 20px;
    font-weight: bold;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    margin-bottom: 15px;
  }

  .backBtn:hover {
    background: #0d47a1;
  }

  .table-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-top: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    min-width: 700px;
  }

  th, td {
    padding: 12px 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
    font-size: 20px;
  }

  th {
    background: #eee;
    font-weight: bold;
  }

  tr:hover {
    background: #f0f8ff;
  }

  button.deleteBtn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 26px;
    padding: 6px 10px;
  }

  button.deleteBtn:hover {
    color: red;
  }

  @media (max-width: 480px) {
    td:nth-child(4), th:nth-child(4), /* výška */
    td:nth-child(5), th:nth-child(5)  /* poznámka */
    {
      display: none;
    }
  }
</style>
</head>

<body>

<a href="index.html" class="backBtn">⟵ Zpět na úvod</a>

<h1>Seznam uložených míst</h1>

<div class="table-wrapper">
  <table id="placesTable">
    <thead>
      <tr>
        <th>Datum</th>
        <th>Název</th>
        <th>Souřadnice</th>
        <th>Výška</th>
        <th>Poznámka</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let places = [];

/* Načtení míst */
function loadPlaces() {
  let data = localStorage.getItem("myPlaces");
  if (data) places = JSON.parse(data);
}

/* Uložení */
function savePlaces() {
  localStorage.setItem("myPlaces", JSON.stringify(places));
}

/* Mazání */
function deletePlace(index) {
  if (!confirm("Opravdu odstranit toto místo?")) return;
  places.splice(index, 1);
  savePlaces();
  renderPlaces();
}

/* Vykreslení tabulky */
function renderPlaces() {
  let tbody = document.querySelector("#placesTable tbody");
  tbody.innerHTML = "";

  places.forEach((p, index) => {
    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${p.date}</td>
      <td>${p.name}</td>
      <td>${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</td>
      <td>${p.alt || ""}</td>
      <td>${p.note || ""}</td>
      <td><button class="deleteBtn" onclick="deletePlace(${index})">🗑️</button></td>
    `;

    tbody.appendChild(tr);
  });
}

/* Start */
loadPlaces();
renderPlaces();
</script>

</body>
</html>
