<!DOCTYPE html>
<html lang="cs">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigace</title>

<style>
  body {
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
  }

  #backbtn {
    display: block;
    padding: 20px 30px;
    background: #444;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-size: 40px;
    margin-bottom: 30px;
  }

  #distance {
    font-size: 64px;
    font-weight: bold;
    margin: 20px 0;
  }

  #accuracy {
    font-size: 28px;
    color: #555;
    margin-bottom: 20px;
  }

  #arrow {
    width: 160px;
    height: 160px;
    transition: transform 0.15s linear;
    margin-top: 20px;
  }

  #info {
    font-size: 22px;
    margin-top: 30px;
  }
</style>
</head>
<body>

<a id="backbtn" href="nove_misto.html">⬅️ Zpět</a>

<h2>Navigace na bod</h2>

<div id="distance">—</div>
<div id="accuracy">Přesnost: —</div>

<img id="arrow" src="arrow.svg">

<div id="info">
  <div>Cíl: <span id="target"></span></div>
  <div>Moje pozice: <span id="current"></span></div>
</div>

<script>
const p = new URLSearchParams(location.search);
const targetLat = parseFloat(p.get("lat"));
const targetLon = parseFloat(p.get("lon"));

document.getElementById("target").textContent =
  `${targetLat.toFixed(5)}, ${targetLon.toFixed(5)}`;

let bearing = null;
let heading = null;
let lastHeading = null;

// Výpočet vzdálenosti
function updateDistance(lat, lon) {
  const R = 6371e3;
  const φ1 = lat * Math.PI/180;
  const φ2 = targetLat * Math.PI/180;
  const Δφ = (targetLat - lat) * Math.PI/180;
  const Δλ = (targetLon - lon) * Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
            Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;

  const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  document.getElementById("distance").textContent = Math.round(d) + " m";
}

// Bearing k cíli
function updateBearing(lat, lon) {
  const φ1 = lat * Math.PI/180;
  const φ2 = targetLat * Math.PI/180;
  const λ1 = lon * Math.PI/180;
  const λ2 = targetLon * Math.PI/180;

  const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
  const x = Math.cos(φ1)*Math.sin(φ2) -
            Math.sin(φ1)*Math.cos(φ2)*Math.cos(λ2 - λ1);

  bearing = (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
  updateArrow();
}

// Otáčení šipky
function updateArrow() {
  if (bearing == null || heading == null) return;
  const rot = (bearing - heading + 360) % 360;
  document.getElementById("arrow").style.transform = `rotate(${rot}deg)`;
}

// GPS
navigator.geolocation.watchPosition(pos => {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = pos.coords.accuracy;

  document.getElementById("current").textContent =
    `${lat.toFixed(5)}, ${lon.toFixed(5)}`;

  document.getElementById("accuracy").textContent =
    `Přesnost: ${Math.round(acc)} m`;

  updateDistance(lat, lon);
  updateBearing(lat, lon);
});

// Stabilní kompas pro Android
window.addEventListener("deviceorientation", e => {
  if (e.alpha == null) return;

  let h = null;

  // 1) Android absolute heading
  if (e.absolute === true && e.alpha != null) {
    h = (360 - e.alpha) % 360;
  }

  // 2) iOS
  else if (e.webkitCompassHeading != null) {
    h = e.webkitCompassHeading;
  }

  // 3) fallback – relativní rotace + orientace displeje
  else {
    const orientation = screen.orientation?.angle || 0;
    h = (e.alpha + orientation) % 360;
  }

  // Vyhlazení (odstraní cukání)
  if (lastHeading == null) lastHeading = h;
  heading = lastHeading * 0.7 + h * 0.3;
  lastHeading = heading;

  updateArrow();
});

// iOS explicitní povolení
if (window.DeviceOrientationEvent && DeviceOrientationEvent.requestPermission) {
  DeviceOrientationEvent.requestPermission().then(state => {
    if (state === "granted") {
      window.addEventListener("deviceorientation", e => {
        if (e.webkitCompassHeading !== undefined) {
          heading = 360 - e.webkitCompassHeading;
          updateArrow();
        }
      });
    }
  });
}
</script>

</body>
</html>
