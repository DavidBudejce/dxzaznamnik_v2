<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>DX Záznamník – Výpis</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
  }
  h1 {
    margin-bottom: 15px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }
  th, td {
    padding: 8px 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
  }
  th {
    background: #eee;
  }
  tr:hover {
    background: #f0f8ff;
  }
  button.deleteBtn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
  }
  button.deleteBtn:hover {
    color: red;
  }
</style>
</head>
<body>

<h1>DX Záznamník – Výpis záznamů</h1>

<table id="logTable">
  <thead>
    <tr>
      <th>Datum</th>
      <th>Čas</th>
      <th>Jméno</th>
      <th>DX lokátor</th>
      <th>Vzdálenost</th>
      <th>Azimut</th>
      <th>Pozn.</th>
      <th></th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
// -----------------------------
// Úložiště
// -----------------------------
let logEntries = [];

function saveLog() {
  localStorage.setItem("logEntries", JSON.stringify(logEntries));

}

function loadLog() {
  let data = localStorage.getItem("logEntries");
  if (data) logEntries = JSON.parse(data);
}

// -----------------------------
// Mazání záznamu
// -----------------------------
function deleteEntry(index) {
  if (!confirm("Opravdu odstranit tento záznam?")) return;
  logEntries.splice(index, 1);
  saveLog();
  renderLog();
}

// -----------------------------
// Vykreslení tabulky
// -----------------------------
function renderLog() {
  let tbody = document.querySelector("#logTable tbody");
  tbody.innerHTML = "";

  logEntries.forEach((e, index) => {
    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${e.date}</td>
      <td>${e.time}</td>
      <td>${e.name}</td>
      <td>${e.dxLocator}</td>
      <td>${e.distance.toFixed(1)} km</td>
      <td>${e.azimuth.toFixed(0)}°</td>
      <td>${e.note || ""}</td>
      <td><button class="deleteBtn" onclick="deleteEntry(${index})">🗑️</button></td>
    `;

    tbody.appendChild(tr);
  });
}

// -----------------------------
// Start
// -----------------------------
loadLog();
renderLog();
</script>

</body>
</html>
