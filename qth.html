<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>QTH Lokátor – GPS ověření</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
}
#map {
    height: 70vh;
}
#panel {
    padding: 10px;
    background: #f0f0f0;
}
button {
    padding: 10px 15px;
    font-size: 16px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="panel">
    <h1>Zapni GPS pro vyhledání aktuálního QTH</h1>
    <div><b>Souřadnice:</b> <span id="coords">–</span></div>
    <div><b>Lokátor:</b> <span id="locator">–</span></div>
    <div><b>Přesnost GPS:</b> <span id="acc">–</span></div>

    <button id="confirmBtn" onclick="confirmQTH()">Potvrdit QTH</button>
    <div id="confirmed" style="margin-top:10px; color:green; font-weight:bold;"></div>

    <button id="goLog" style="display:none;" onclick="window.location.href = 'nove_spojeni.html'">
        Pokračovat do logbooku
    </button>
</div>

<div id="map"></div>

<script>
// ------------------------------------------------------------
// Maidenhead lokátor – převod GPS › 6 znaků
// ------------------------------------------------------------
function latLonToLocator(lat, lon) {
    lon = lon + 180;
    lat = lat + 90;

    let A = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let a = "abcdefghijklmnopqrstuvwxyz";

    let fieldLon = Math.floor(lon / 20);
    let fieldLat = Math.floor(lat / 10);

    let squareLon = Math.floor((lon % 20) / 2);
    let squareLat = Math.floor((lat % 10) / 1);

    let subsLon = Math.floor(((lon % 2) * 60) / 5);
    let subsLat = Math.floor(((lat % 1) * 60) / 2.5);

    return A[fieldLon] + A[fieldLat] +
           squareLon.toString() + squareLat.toString() +
           a[subsLon] + a[subsLat];
}

// ------------------------------------------------------------
// Výpočet hranic lokátorového čtverce (6 znaků)
// ------------------------------------------------------------
function locatorToBounds(locator) {
    let A = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let a = "abcdefghijklmnopqrstuvwxyz";

    let lon = (A.indexOf(locator[0]) * 20) - 180;
    let lat = (A.indexOf(locator[1]) * 10) - 90;

    lon += parseInt(locator[2]) * 2;
    lat += parseInt(locator[3]) * 1;

    lon += (a.indexOf(locator[4]) * 5) / 60;
    lat += (a.indexOf(locator[5]) * 2.5) / 60;

    let lon2 = lon + 5/60;
    let lat2 = lat + 2.5/60;

    return [[lat, lon], [lat2, lon2]];
}

// ------------------------------------------------------------
// Leaflet mapa
// ------------------------------------------------------------
let map = L.map('map').setView([49, 14], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18
}).addTo(map);

let marker = null;
let accuracyCircle = null;
let locatorRect = null;

// ------------------------------------------------------------
// GPS sledování
// ------------------------------------------------------------
navigator.geolocation.watchPosition(pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;
    let acc = pos.coords.accuracy;

    document.getElementById("coords").textContent = lat.toFixed(5) + ", " + lon.toFixed(5);
    document.getElementById("acc").textContent = acc.toFixed(1) + " m";

    let loc = latLonToLocator(lat, lon);
    document.getElementById("locator").textContent = loc;

    // modrá tečka
    if (!marker) {
        marker = L.circleMarker([lat, lon], {
            radius: 6,
            color: "blue",
            fillColor: "blue",
            fillOpacity: 1
        }).addTo(map);
    } else {
        marker.setLatLng([lat, lon]);
    }

    // přesnost
    if (!accuracyCircle) {
        accuracyCircle = L.circle([lat, lon], {radius: acc, color: "blue", fillOpacity: 0.1}).addTo(map);
    } else {
        accuracyCircle.setLatLng([lat, lon]);
        accuracyCircle.setRadius(acc);
    }

    // lokátorový čtverec
    let b = locatorToBounds(loc);
    if (locatorRect) map.removeLayer(locatorRect);
    locatorRect = L.rectangle(b, {color: "red", weight: 2}).addTo(map);

    map.setView([lat, lon]);
});

// ------------------------------------------------------------
// Potvrzení QTH
// ------------------------------------------------------------
function confirmQTH() {
    let loc = document.getElementById("locator").textContent;
    let coords = document.getElementById("coords").textContent;

    localStorage.setItem("myQTH", loc);
    localStorage.setItem("myCoords", coords);
    localStorage.setItem("myQTHtime", new Date().toLocaleTimeString());

    document.getElementById("confirmed").textContent =
        "? QTH potvrzeno: " + loc + " (" + coords + ")";

    document.getElementById("goLog").style.display = "block";
}
</script>

</body>
</html>
