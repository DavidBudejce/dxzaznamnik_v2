<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>DX Záznamník – Výpis</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 12px;
    background: #f5f5f5;
  }

  h1 {
    margin-bottom: 15px;
  }

  /* Mobilní scroll */
  .table-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-top: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    min-width: 650px;
  }

  th, td {
    padding: 10px 8px;
    border-bottom: 1px solid #ddd;
    text-align: left;
    font-size: 20px;
  }

  th {
    background: #eee;
  }

  tr:hover {
    background: #f0f8ff;
  }

  button.deleteBtn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 22px;
    padding: 6px 10px;
  }

  button.deleteBtn:hover {
    color: red;
  }

  /* Mobil – skryjeme méně důležité sloupce */
  @media (max-width: 480px) {
    td:nth-child(6), th:nth-child(6),  /* Azimut */
    td:nth-child(7), th:nth-child(7) { /* Poznámka */
      display: none;
    }
  }
  
  
  .backBtn {
  display: inline-block;
  padding: 20px 18px;
  background: #1976d2;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-size: 18px;
  margin-bottom: 15px;
}

.backBtn:hover {
  background: #0d47a1;
}

@media (max-width: 480px) {
  .backBtn {
    width: 100%;
    text-align: center;
    font-size: 30px;
    padding: 20px;
  }
}

</style>
</head>

<body>

<h1>DX Záznamník – Výpis záznamů</h1>

<label for="dateFilter">Filtrovat podle datumu:</label>
<input type="date" id="dateFilter" style="margin-bottom: 15px; display:block; width: 200px;">

<div class="table-wrapper">
  <table id="logTable">
    <thead>
      <tr>
        <th>Datum</th>
        <th>Čas</th>
        <th>Jméno</th>
        <th>DX lokátor</th>
        <th>Vzdálenost</th>
        <th>Azimut</th>
        <th>Pozn.</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let logEntries = [];

/* Načtení z localStorage */
function loadLog() {
  let data = localStorage.getItem("logEntries");
  if (data) logEntries = JSON.parse(data);
}

/* Uložení */
function saveLog() {
  localStorage.setItem("logEntries", JSON.stringify(logEntries));
}

/* Mazání záznamu */
function deleteEntry(index) {
  if (!confirm("Opravdu odstranit tento záznam?")) return;
  logEntries.splice(index, 1);
  saveLog();
  renderLog();
}

/* Vykreslení tabulky + filtr datumu */
function renderLog() {
  let tbody = document.querySelector("#logTable tbody");
  tbody.innerHTML = "";

  let selectedDate = document.getElementById("dateFilter").value;

  // vytvoříme pole s původními indexy
  let filtered = logEntries
    .map((e, i) => ({ ...e, originalIndex: i }))
    .filter(e => !selectedDate || e.date === selectedDate);

  filtered.forEach(e => {
    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${e.date}</td>
      <td>${e.time}</td>
      <td>${e.name}</td>
      <td>${e.dxLocator}</td>
      <td>${e.distance.toFixed(1)} km</td>
      <td>${e.azimuth.toFixed(0)}°</td>
      <td>${e.note || ""}</td>
      <td><button class="deleteBtn" onclick="deleteEntry(${e.originalIndex})">🗑️</button></td>
    `;

    tbody.appendChild(tr);
  });
}


/* Aktivace filtru */
document.getElementById("dateFilter").addEventListener("change", renderLog);

/* Start */
loadLog();
renderLog();
</script>

<a href="index.html" class="backBtn">⟵ Zpět na úvod</a>


</body>
</html>
